<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 Classements — Trophée Paul Tavano U13M</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d16; --surface: #111827; --border: rgba(255,255,255,0.07);
    --text: #e8eaf0; --muted: #64748b; --tnt: #F97316; --tmb: #ef4444;
    --blois: #22c55e; --montrichard: #EAB308; --ces: #dc2626; --azay: #16a34a;
    --accent: #7084FF; --gold: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 0 0 40px; }
  .hero { background: linear-gradient(135deg,#0f172a 0%,#1a1040 60%,#0f172a 100%); padding: 24px 16px 18px; text-align: center; border-bottom:1px solid var(--border); }
  .hero h1 { font-family:'Syne',sans-serif; font-size:clamp(1rem,4vw,1.4rem); font-weight:800; color:#fff; }
  .hero h1 span { color:var(--tnt); }
  .hero .sub { font-size:.7rem; color:var(--accent); margin-top:4px; }
  .hero .nav-links { margin-top:10px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
  .hero .nav-links a { font-size:.68rem; font-weight:600; letter-spacing:.04em; text-decoration:none; padding:5px 12px; border-radius:20px; transition:all .15s; }
  .hero .nav-links a.bkt { color:var(--gold); background:rgba(251,191,36,.1); border:1px solid rgba(251,191,36,.2); }
  .hero .nav-links a.scores { color:var(--accent); background:rgba(112,132,255,.12); border:1px solid rgba(112,132,255,.2); }
  .hero .nav-links a.elim { color:#a78bfa; background:rgba(124,58,237,.12); border:1px solid rgba(124,58,237,.2); }
  .container { max-width: 560px; margin: 0 auto; padding: 14px 12px; }
  .section-label { font-family:'Syne',sans-serif; font-size:.68rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }
  .standings-table { width:100%; border-collapse:collapse; background:var(--surface); border-radius:12px; overflow:hidden; border:1px solid var(--border); margin-bottom:16px; }
  .standings-table th { font-family:'Syne',sans-serif; font-size:.65rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; padding:10px 8px; background:rgba(255,255,255,.04); color:var(--muted); text-align:center; }
  .standings-table th:first-child { text-align:left; padding-left:14px; }
  .standings-table td { padding:9px 8px; font-size:.82rem; text-align:center; border-top:1px solid var(--border); }
  .standings-table td:first-child { text-align:left; padding-left:14px; font-weight:600; }
  .rank-num { display:inline-block; width:20px; height:20px; line-height:20px; border-radius:50%; font-size:.7rem; font-weight:700; text-align:center; background:rgba(255,255,255,.06); margin-right:6px; }
  .rank-1 { color:var(--tnt); } .rank-2 { color:var(--montrichard); }
  .pts { font-weight:700; font-family:'JetBrains Mono',monospace; color:#fff; }
  .team-tag { display:inline-block; padding:2px 7px; border-radius:5px; font-size:.75rem; font-weight:600; }
  .team-tnt { color:var(--tnt); background:rgba(249,115,22,.12); }
  .team-tmb { color:var(--tmb); background:rgba(239,68,68,.12); }
  .team-blois { color:#22c55e; background:rgba(34,197,94,.12); }
  .team-montrichard { color:var(--montrichard); background:rgba(234,179,8,.12); }
  .team-ces { color:#fca5a5; background:rgba(220,38,38,.12); }
  .team-azay { color:#86efac; background:rgba(22,163,74,.12); }
  .team-other { color:var(--muted); background:rgba(255,255,255,.06); }
  .loading { text-align:center; padding:40px; color:var(--muted); font-size:.9rem; }
  .legend { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; padding:10px 0 14px; }
  .legend-item { display:flex; align-items:center; gap:4px; background:var(--surface); border-radius:20px; padding:3px 10px; font-size:.7rem; font-weight:600; border:1px solid var(--border); }
  .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .dot-tnt { background:var(--tnt); box-shadow:0 0 5px rgba(249,115,22,.5); }
  .dot-tmb { background:var(--tmb); box-shadow:0 0 5px rgba(239,68,68,.5); }
  .dot-blois { background:var(--blois); box-shadow:0 0 5px rgba(34,197,94,.5); }
  .dot-montrichard { background:var(--montrichard); box-shadow:0 0 5px rgba(234,179,8,.5); }
  .dot-ces { background:linear-gradient(135deg,#dc2626,#fff); box-shadow:0 0 5px rgba(220,38,38,.5); }
  .dot-azay { background:linear-gradient(135deg,#16a34a,#fff); box-shadow:0 0 5px rgba(22,163,74,.5); }
</style>
</head>
<body>
<div class="hero">
  <h1>📊 <span>Classements</span></h1>
  <div class="sub">Trophée Paul Tavano · U13M · 8 mai 2026</div>
  <div class="nav-links">
    <a href="/" class="bkt">🏆 Bracket</a>
    <a href="/scores.html" class="scores">📋 Scores</a>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="dot dot-tnt"></div>TNT</div>
  <div class="legend-item"><div class="dot dot-tmb"></div>Tours MB</div>
  <div class="legend-item"><div class="dot dot-blois"></div>ADA Blois</div>
  <div class="legend-item"><div class="dot dot-montrichard"></div>Montrichard</div>
  <div class="legend-item"><div class="dot dot-ces"></div>CES Tours</div>
  <div class="legend-item"><div class="dot dot-azay"></div>Azay Cheillé</div>
</div>

<div class="container">
  <div id="standingsContainer">
    <div class="loading" id="loadingMsg">⏳ Chargement des classements...</div>
  </div>
</div>

<script>
const POULE_A_TEAMS = { 'TNT1':'tnt', 'ADA Blois':'blois', 'CES Tours':'ces', 'Azay Cheillé':'azay' };
const POULE_B_TEAMS = { 'TNT2':'tnt', 'Tours MB':'tmb', 'Montrichard':'montrichard', 'CRA Basket':'other' };

const MATCHES = [
  {id:'1',  t1:'TNT2', t2:'Montrichard'},
  {id:'2',  t1:'ADA Blois', t2:'Azay Cheillé'},
  {id:'3',  t1:'Tours MB', t2:'CRA Basket'},
  {id:'4',  t1:'TNT1', t2:'ADA Blois'},
  {id:'5',  t1:'CRA Basket', t2:'TNT2'},
  {id:'6',  t1:'Azay Cheillé', t2:'CES Tours'},
  {id:'7',  t1:'Tours MB', t2:'Montrichard'},
  {id:'8',  t1:'CES Tours', t2:'TNT1'},
  {id:'9',  t1:'Montrichard', t2:'CRA Basket'},
  {id:'10', t1:'TNT1', t2:'Azay Cheillé'},
  {id:'11', t1:'TNT2', t2:'Tours MB'},
  {id:'12', t1:'ADA Blois', t2:'CES Tours'},
];

let scores = {};

async function loadScores() {
  try {
    const resp = await fetch('/api/score');
    const data = await resp.json();
    if (data.success) scores = data.scores || {};
  } catch(e) { console.warn(e); }
  render();
}

function computeStandings(pouleTeams) {
  const teams = {};
  Object.keys(pouleTeams).forEach(name => { teams[name] = { name, mj:0, g:0, p:0, pts:0, color: pouleTeams[name] }; });
  
  MATCHES.forEach(m => {
    const s = scores[m.id];
    if (!s || !s.s1 || !s.s2) return;
    const n1 = parseInt(s.s1), n2 = parseInt(s.s2);
    if (isNaN(n1) || isNaN(n2)) return;
    if (teams[m.t1]) { teams[m.t1].mj++; if (n1 > n2) { teams[m.t1].g++; teams[m.t1].pts += 2; } else { teams[m.t1].p++; teams[m.t1].pts += 1; } }
    if (teams[m.t2]) { teams[m.t2].mj++; if (n2 > n1) { teams[m.t2].g++; teams[m.t2].pts += 2; } else { teams[m.t2].p++; teams[m.t2].pts += 1; } }
  });
  return Object.values(teams).sort((a, b) => b.pts - a.pts || b.g - a.g);
}

function render() {
  document.getElementById('loadingMsg').style.display = 'none';
  const stdA = computeStandings(POULE_A_TEAMS);
  const stdB = computeStandings(POULE_B_TEAMS);
  
  document.getElementById('standingsContainer').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div>
        <div style="font-size:.7rem;font-weight:700;color:var(--tnt);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;padding-left:2px">Poule A</div>
        <table class="standings-table"><thead><tr><th>Équipe</th><th>MJ</th><th>G</th><th>P</th><th>Pts</th></tr></thead><tbody>
          ${stdA.map((t,i) => `<tr>
            <td><span class="rank-num ${i<2?'rank-'+(i+1):''}">${i+1}</span><span class="team-tag team-${t.color}">${t.name}</span></td>
            <td>${t.mj}</td><td style="color:#22c55e;font-weight:600">${t.g}</td><td style="color:#ef4444;font-weight:600">${t.p}</td>
            <td class="pts">${t.pts}</td></tr>`).join('')}
        </tbody></table>
      </div>
      <div>
        <div style="font-size:.7rem;font-weight:700;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;padding-left:2px">Poule B</div>
        <table class="standings-table"><thead><tr><th>Équipe</th><th>MJ</th><th>G</th><th>P</th><th>Pts</th></tr></thead><tbody>
          ${stdB.map((t,i) => `<tr>
            <td><span class="rank-num ${i<2?'rank-'+(i+1):''}">${i+1}</span><span class="team-tag team-${t.color}">${t.name}</span></td>
            <td>${t.mj}</td><td style="color:#22c55e;font-weight:600">${t.g}</td><td style="color:#ef4444;font-weight:600">${t.p}</td>
            <td class="pts">${t.pts}</td></tr>`).join('')}
        </tbody></table>
      </div>
    </div>
    <div style="text-align:center;margin-top:14px;font-size:.68rem;color:var(--muted);font-family:'JetBrains Mono',monospace">
      🔄 Rafraîchir pour mettre à jour · V=2pts · D=1pt
    </div>`;
}

loadScores();
</script>
</body>
</html>
