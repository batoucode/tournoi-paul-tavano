<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🏆 Bracket — Trophée Paul Tavano U13M</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d16;
    --surface: #111827;
    --surface2: #1a1f30;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8eaf0;
    --muted: #64748b;
    --tnt: #F97316;
    --tmb: #ef4444;
    --blois: #22c55e;
    --montrichard: #EAB308;
    --ces: #dc2626;
    --azay: #16a34a;
    --accent: #7084FF;
    --gold: #fbbf24;
    --elim: #a78bfa;
    --green: #22c55e;
    --red: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0 0 40px;
    background-image: radial-gradient(ellipse at 50% 0%, rgba(112,132,255,.06) 0%, transparent 70%);
  }

  /* HERO */
  .hero {
    background: linear-gradient(135deg,#0f172a 0%,#1a1040 50%,#0f172a 100%);
    padding: 24px 16px 18px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(249,115,22,.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero .trophy { font-size: 2rem; display: block; margin-bottom: 4px; filter: drop-shadow(0 0 10px rgba(249,115,22,.4)); }
  .hero h1 { font-family: 'Syne', sans-serif; font-size: clamp(1rem,4vw,1.4rem); font-weight: 800; letter-spacing: -.02em; color: #fff; }
  .hero h1 span { color: var(--tnt); }
  .hero .sub { font-size: .72rem; color: var(--accent); margin-top: 4px; font-weight: 500; }
  .hero .nav-links { margin-top: 10px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .hero .nav-links a {
    font-size: .7rem; font-weight: 600; letter-spacing: .04em; text-decoration: none;
    padding: 5px 14px; border-radius: 20px; transition: all .15s;
  }
  .hero .nav-links a.home { color: var(--accent); background: rgba(112,132,255,.12); border: 1px solid rgba(112,132,255,.2); }
  .hero .nav-links a.home:hover { background: rgba(112,132,255,.2); }
  .hero .nav-links a.bracket { color: var(--elim); background: rgba(124,58,237,.12); border: 1px solid rgba(124,58,237,.2); }

  /* MAIN LAYOUT */
  .container { max-width: 560px; margin: 0 auto; padding: 14px 12px; }

  /* ROUND HEADER */
  .round { margin-bottom: 6px; }
  .round-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding: 0 2px;
  }
  .round-header .icon { font-size: 1rem; }
  .round-header h2 {
    font-family: 'Syne', sans-serif; font-size: .7rem; font-weight: 700;
    letter-spacing: .12em; text-transform: uppercase;
  }
  .round-header .line { flex: 1; height: 1px; }
  .round-header.q .line { background: linear-gradient(90deg, var(--elim), transparent); }
  .round-header.sf .line { background: linear-gradient(90deg, #60a5fa, transparent); }
  .round-header.f .line { background: linear-gradient(90deg, var(--gold), transparent); }
  .round-header.third .line { background: linear-gradient(90deg, var(--muted), transparent); }
  .round-header.q h2 { color: var(--elim); }
  .round-header.sf h2 { color: #60a5fa; }
  .round-header.f h2 { color: var(--gold); }
  .round-header.third h2 { color: var(--muted); }

  /* MATCH CARD */
  .match-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 10px;
    transition: all .25s;
  }
  .match-card.played { border-color: rgba(34,197,94,.2); }
  .match-card.played .top-accent { background: var(--green); height: 3px; }
  .match-card:not(.played) .top-accent { background: var(--border); height: 3px; }
  .match-card.live { border-color: rgba(249,115,22,.4); box-shadow: 0 0 12px rgba(249,115,22,.1); }

  .match-body {
    padding: 10px 12px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .match-meta {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;
  }
  .match-tag {
    font-size: .58rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 5px;
  }
  .match-tag.q { background: rgba(124,58,237,.15); color: var(--elim); }
  .match-tag.sf { background: rgba(96,165,250,.15); color: #60a5fa; }
  .match-tag.fin { background: rgba(249,115,22,.18); color: var(--gold); }
  .match-tag.third { background: rgba(100,116,139,.15); color: var(--muted); }
  .match-terrain { font-size: .6rem; color: var(--muted); }

  /* TEAM ROW */
  .team-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; border-radius: 8px;
    transition: all .2s;
    min-height: 36px;
  }
  .team-row + .team-row { margin-top: 3px; }

  .team-row .team-name {
    flex: 1;
    font-size: .82rem; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .team-row .team-score {
    font-family: 'JetBrains Mono', monospace;
    font-size: .9rem; font-weight: 600;
    min-width: 26px; text-align: center;
  }
  .team-row .team-badge {
    width: 4px; height: 4px; border-radius: 50%;
    flex-shrink: 0;
  }

  .team-row.winner {
    background: rgba(249,115,22,.08);
    border: 1px solid rgba(249,115,22,.15);
  }
  .team-row.winner .team-name { font-weight: 700; }
  .team-row.loser { opacity: .45; }
  .team-row.no-score { opacity: .7; }
  .team-row.tnt   .team-score { color: var(--tnt); }
  .team-row.tmb   .team-score { color: var(--tmb); }
  .team-row.blois .team-score { color: #22c55e; }
  .team-row.montrichard .team-score { color: var(--montrichard); }
  .team-row.ces .team-score { color: #fca5a5; }
  .team-row.azay .team-score { color: #86efac; }
  .team-row.other .team-score { color: var(--muted); }
  .team-row.tnt  .team-name { color: var(--tnt); }
  .team-row.tmb  .team-name { color: var(--tmb); }
  .team-row.blois .team-name { color: #22c55e; }
  .team-row.montrichard .team-name { color: var(--montrichard); }
  .team-row.ces .team-name { color: #fca5a5; }
  .team-row.azay .team-name { color: #86efac; }

  .team-row .arrow {
    font-size: .65rem;
    color: var(--green);
    font-weight: 700;
    margin-left: auto;
    white-space: nowrap;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }

  /* ADVANCEMENT ARROW */
  .advance-row {
    text-align: center;
    padding: 1px 0 8px;
    font-size: .68rem;
    color: var(--muted);
  }
  .advance-row span {
    display: inline-block;
    background: var(--surface);
    padding: 3px 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
  }
  .advance-row span strong { color: #60a5fa; }

  /* EDIT OVERLAY */
  .edit-overlay {
    display: none;
    padding: 8px 12px 12px;
    border-top: 1px solid var(--border);
    background: rgba(0,0,0,.15);
  }
  .edit-overlay.open { display: block; animation: slideIn .15s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

  .edit-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .edit-row select {
    flex: 1;
    background: rgba(255,255,255,.06);
    border: 1.5px solid var(--border2);
    border-radius: 8px;
    padding: 7px 8px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: .78rem;
    outline: none;
    cursor: pointer;
    transition: border-color .15s;
  }
  .edit-row select:focus { border-color: var(--accent); }
  .edit-row select option { background: #1a1f2e; color: #fff; }
  .edit-row .vs-small { font-family: 'Syne', sans-serif; font-size: .7rem; font-weight: 800; color: var(--muted); }

  .edit-actions { display: flex; gap: 6px; }
  .edit-actions button {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: .78rem;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: all .12s;
  }
  .edit-actions button:active { transform: scale(.97); }
  .btn-save { background: var(--accent); color: #fff; }
  .btn-cancel { background: rgba(255,255,255,.06); color: var(--muted); border: 1px solid var(--border) !important; }
  .saved-badge { font-size: .6rem; color: var(--green); font-weight: 600; text-align: right; padding: 2px 4px 0; }

  /* CONNECTOR */
  .connector {
    display: flex; align-items: center; justify-content: center;
    padding: 2px 0;
    position: relative;
  }
  .connector .vline {
    width: 2px; height: 16px;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,.08));
    margin: 0 auto;
  }
  .connector .arrow-down {
    font-size: .8rem;
    color: rgba(255,255,255,.1);
    text-align: center;
  }

  /* WINNER CELEBRATION */
  .champion-card {
    text-align: center;
    padding: 18px;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(249,115,22,.12), rgba(251,191,36,.08));
    border: 2px solid rgba(249,115,22,.3);
    margin-top: 4px;
    position: relative;
    overflow: hidden;
  }
  .champion-card::before {
    content: '';
    position: absolute;
    inset: -50%;
    background: conic-gradient(from 0deg, transparent, rgba(249,115,22,.03), transparent, rgba(251,191,36,.03), transparent);
    animation: spin 8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .champion-card * { position: relative; z-index: 1; }
  .champion-card .crown { font-size: 2.2rem; display: block; margin-bottom: 4px; }
  .champion-card .name { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 800; color: var(--gold); }
  .champion-card .sub { font-size: .75rem; color: var(--muted); margin-top: 3px; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 30px 20px;
    color: var(--muted);
  }
  .empty-state .eicon { font-size: 2rem; display: block; margin-bottom: 6px; }

  /* SCORE INPUT PANEL for QF (inline) */
  .score-edit {
    display: none;
    margin-top: 6px;
    padding: 8px 0 4px;
    border-top: 1px solid var(--border);
  }
  .score-edit.open { display: block; }
  .score-inputs { display: flex; align-items: flex-end; gap: 8px; }
  .score-inputs .block { flex: 1; }
  .score-inputs .block label { font-size: .6rem; color: var(--muted); display: block; margin-bottom: 3px; }
  .score-inputs input {
    width: 100%; background: rgba(255,255,255,.06);
    border: 1.5px solid var(--border2);
    border-radius: 8px; padding: 10px 6px;
    color: #fff; font-family: 'JetBrains Mono', monospace;
    font-size: 1.2rem; font-weight: 500; text-align: center;
    outline: none;
    -moz-appearance: textfield;
    transition: border-color .15s;
  }
  .score-inputs input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .score-inputs input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(112,132,255,.15); }
  .score-inputs .vs-sep {
    font-family: 'Syne', sans-serif; font-size: .9rem; font-weight: 700;
    color: var(--muted); padding-bottom: 12px;
  }
  .score-btn { margin-top: 8px; display: flex; gap: 6px; }
  .score-btn button {
    flex: 1; padding: 9px; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: .78rem; font-weight: 600;
    border: none; cursor: pointer; transition: all .12s;
  }
  .score-btn button:active { transform: scale(.97); }
  .score-btn .ok { background: var(--accent); color: #fff; }
  .score-btn .del { background: rgba(239,68,68,.12); color: var(--red); border: 1px solid rgba(239,68,68,.2) !important; }

  @media (max-width: 400px) {
    .match-body { padding: 8px 10px; }
    .team-row { padding: 5px 6px; gap: 5px; }
    .team-row .team-name { font-size: .76rem; }
    .team-row .team-score { font-size: .82rem; min-width: 22px; }
  }
</style>
</head>
<body>

<div class="hero">
  <span class="trophy">🏆</span>
  <h1>Trophée <span>Paul Tavano</span></h1>
  <div class="sub">📅 8 MAI 2026 · U13M</div>
  <div class="nav-links">
    <a href="/" class="home">⬅ Retour aux scores</a>
    <a href="/bracket.html" class="bracket">🏆 Bracket</a>
  </div>
</div>

<div class="container" id="app">
  <div class="empty-state" id="loading">
    <span class="eicon">⏳</span>
    Chargement du bracket…
  </div>
</div>

<script>
// ── TEAMS ──
const ALL_TEAMS = {
  'TNT1': 'tnt', 'ADA Blois': 'blois', 'CES Tours': 'ces', 'Azay Cheillé': 'azay',
  'TNT2': 'tnt', 'Tours MB': 'tmb', 'Montrichard': 'montrichard', 'CRA Basket': 'other'
};

// ── BRACKET DEFINITION ──
const QF_MATCHES = [
  { id:'14', label:'1er 1/4 F', t1:'ADA Blois', c1:'blois', t2:'CRA Basket', c2:'other', sf:'sf1' },
  { id:'13', label:'3ème 1/4 F', t1:'Tours MB', c1:'tmb', t2:'CES Tours', c2:'ces', sf:'sf1' },
  { id:'16', label:'2ème 1/4 F', t1:'TNT1', c1:'tnt', t2:'Montrichard', c2:'montrichard', sf:'sf2' },
  { id:'15', label:'4ème 1/4 F', t1:'TNT2', c1:'tnt', t2:'Azay Cheillé', c2:'azay', sf:'sf2' },
];

const SF_CONFIG = [
  { id:'17', label:'1ère 1/2 F', sf:'sf1', tag:'sf', terrain:'Salle Paul Tavano · 15:15' },
  { id:'18', label:'2ème 1/2 F', sf:'sf2', tag:'sf', terrain:'Salle Paul Tavano · 15:45' },
];

const FINAL_CONFIG = { id:'20', label:'🏆 FINALE', terrain:'Salle Paul Tavano' };
const THIRD_CONFIG = { id:'19', label:'🥉 3ème place', terrain:'Aire Pierrot Vérité' };

let scores = {};
let eliminations = {};

async function loadData() {
  try {
    const resp = await fetch('/api/score');
    const data = await resp.json();
    if (data.success) { scores = data.scores || {}; eliminations = data.eliminations || {}; }
  } catch(e) { console.warn('API error:', e); }
}

function getWinner(id) {
  const s = scores[id];
  if (!s || !s.s1 || !s.s2) return null;
  const n1 = parseInt(s.s1), n2 = parseInt(s.s2);
  if (isNaN(n1) || isNaN(n2)) return null;
  const q = QF_MATCHES.find(x => x.id === id);
  if (!q) return null;
  return n1 > n2 ? q.t1 : q.t2;
}

function getSFTeam(sfKey, asWinner) {
  const qfs = QF_MATCHES.filter(q => q.sf === sfKey);
  const allPlayed = qfs.every(q => { const s = scores[q.id]; return s && s.s1 && s.s2; });
  if (!allPlayed) return null;
  if (asWinner) {
    const w = qfs.map(q => {
      const s = scores[q.id];
      const n1 = parseInt(s.s1), n2 = parseInt(s.s2);
      return n1 > n2 ? q.t1 : q.t2;
    });
    return w;
  }
  return null;
}

function getSFScore(sfId) {
  return scores[sfId] || null;
}

function getColor(teamName) {
  return ALL_TEAMS[teamName] || 'other';
}

// ── RENDER ──
function render() {
  const app = document.getElementById('app');
  let html = '';

  // ── QUARTERS ──
  html += `<div class="round"><div class="round-header q"><span class="icon">⚡</span><h2>Quarts de finale</h2><div class="line"></div></div>`;
  QF_MATCHES.forEach(q => {
    const s = scores[q.id];
    const played = s && s.s1 && s.s2;
    const n1 = played ? parseInt(s.s1) : null;
    const n2 = played ? parseInt(s.s2) : null;
    const w1 = played && n1 > n2;
    const w2 = played && n2 > n1;
    const scr1 = played ? s.s1 : '–';
    const scr2 = played ? s.s2 : '–';

    html += `
      <div class="match-card ${played ? 'played' : ''}" id="mf-${q.id}">
        <div class="top-accent"></div>
        <div class="match-body" onclick="toggleScore('${q.id}')">
          <div class="match-meta">
            <span class="match-tag q">${q.label}</span>
          </div>
          <div class="team-row ${q.c1} ${w1 ? 'winner' : (played ? 'loser' : 'no-score')}">
            <span class="team-badge" style="background:var(--${getColor(q.t1) === 'ces' ? 'ces' : getColor(q.t1) === 'azay' ? 'azay' : getColor(q.t1)})"></span>
            <span class="team-name">${q.t1}</span>
            <span class="team-score">${scr1}</span>
            ${w1 ? '<span class="arrow">➜ Demie</span>' : ''}
          </div>
          <div class="team-row ${q.c2} ${w2 ? 'winner' : (played ? 'loser' : 'no-score')}">
            <span class="team-badge" style="background:var(--${getColor(q.t2) === 'ces' ? 'ces' : getColor(q.t2) === 'azay' ? 'azay' : getColor(q.t2)})"></span>
            <span class="team-name">${q.t2}</span>
            <span class="team-score">${scr2}</span>
            ${w2 ? '<span class="arrow">➜ Demie</span>' : ''}
          </div>
        </div>
        <div class="score-edit" id="se-${q.id}">
          <div class="score-inputs">
            <div class="block"><label>${q.t1}</label><input type="number" id="se1-${q.id}" value="${played ? s.s1 : ''}" min="0" placeholder="0"></div>
            <div class="vs-sep">–</div>
            <div class="block"><label>${q.t2}</label><input type="number" id="se2-${q.id}" value="${played ? s.s2 : ''}" min="0" placeholder="0"></div>
          </div>
          <div class="score-btn">
            <button class="ok" onclick="saveScore('${q.id}')">✅ Valider</button>
            <button class="del" onclick="delScore('${q.id}')">🗑</button>
          </div>
        </div>
      </div>`;
  });
  html += `</div>`;

  // ── CONNECTOR → SEMIS ──
  html += `<div class="connector"><div class="vline"></div></div>`;

  // ── SEMIS ──
  html += `<div class="round"><div class="round-header sf"><span class="icon">🔥</span><h2>Demi-finales</h2><div class="line"></div></div>`;

  SF_CONFIG.forEach(sf => {
    const qfs = QF_MATCHES.filter(q => q.sf === sf.sf);
    const allQfPlayed = qfs.every(q => { const s = scores[q.id]; return s && s.s1 && s.s2; });
    const sfScore = scores[sf.id];
    const sfPlayed = sfScore && sfScore.s1 && sfScore.s2;
    const sfN1 = sfPlayed ? parseInt(sfScore.s1) : null;
    const sfN2 = sfPlayed ? parseInt(sfScore.s2) : null;

    let team1 = '?', team2 = '?', c1 = 'other', c2 = 'other';
    let sw1 = false, sw2 = false;
    let team1From, team2From;

    if (allQfPlayed) {
      const winners = qfs.map(q => {
        const s = scores[q.id]; const n1 = parseInt(s.s1), n2 = parseInt(s.s2);
        return n1 > n2 ? q.t1 : q.t2;
      });
      team1 = winners[0]; team2 = winners[1];
      c1 = getColor(team1); c2 = getColor(team2);

      if (sfPlayed) {
        sw1 = sfN1 > sfN2; sw2 = sfN2 > sfN1;
      }
    }

    html += `
      <div class="match-card ${allQfPlayed ? 'played' : ''} ${sfPlayed ? 'played' : ''}" id="mf-${sf.id}">
        <div class="top-accent"></div>
        <div class="match-body" onclick="toggleElimEdit('${sf.id}')">
          <div class="match-meta">
            <span class="match-tag sf">${sf.label}</span>
            <span class="match-terrain">${sf.terrain}</span>
          </div>`;

    if (!allQfPlayed) {
      html += `<div class="empty-state" style="padding:12px"><span class="eicon">⏳</span>En attente des quarts</div>`;
    } else {
      html += `
          <div class="team-row ${c1} ${sw1 ? 'winner' : (sfPlayed ? 'loser' : '')}">
            <span class="team-badge" style="background:var(--${c1 === 'ces' ? 'ces' : c1 === 'azay' ? 'azay' : c1})"></span>
            <span class="team-name">${team1}</span>
            <span class="team-score">${sfPlayed ? sfScore.s1 : '–'}</span>
            ${sw1 ? '<span class="arrow">➜ Finale</span>' : ''}
          </div>
          <div class="team-row ${c2} ${sw2 ? 'winner' : (sfPlayed ? 'loser' : '')}">
            <span class="team-badge" style="background:var(--${c2 === 'ces' ? 'ces' : c2 === 'azay' ? 'azay' : c2})"></span>
            <span class="team-name">${team2}</span>
            <span class="team-score">${sfPlayed ? sfScore.s2 : '–'}</span>
            ${sw2 ? '<span class="arrow">➜ Finale</span>' : ''}
          </div>`;
    }
    html += `
        </div>
        <div class="edit-overlay" id="ee-${sf.id}">
          <div class="edit-row">
            <select id="es1-${sf.id}">${Object.keys(ALL_TEAMS).map(t => `<option value="${t}">${t}</option>`).join('')}</select>
            <span class="vs-small">VS</span>
            <select id="es2-${sf.id}">${Object.keys(ALL_TEAMS).map(t => `<option value="${t}">${t}</option>`).join('')}</select>
          </div>
          <div class="score-inputs" style="margin-top:6px">
            <div class="block"><input type="number" id="sf1-${sf.id}" value="${sfPlayed ? sfScore.s1 : ''}" min="0" placeholder="0"></div>
            <div class="vs-sep">–</div>
            <div class="block"><input type="number" id="sf2-${sf.id}" value="${sfPlayed ? sfScore.s2 : ''}" min="0" placeholder="0"></div>
          </div>
          <div class="edit-actions" style="margin-top:6px">
            <button class="btn-save" onclick="saveElimScore('${sf.id}')">✅ Sauvegarder</button>
            <button class="btn-cancel" onclick="closeElimEdit('${sf.id}')">Annuler</button>
          </div>
          <div class="saved-badge" id="esb-${sf.id}"></div>
        </div>
      </div>`;
  });
  html += `</div>`;

  // ── CONNECTOR → FINAL ──
  html += `<div class="connector"><div class="vline"></div></div>`;

  // ── FINAL ──
  html += `<div class="round"><div class="round-header f"><span class="icon">🏆</span><h2>Finale</h2><div class="line"></div></div>`;

  const allSfPlayed = SF_CONFIG.every(sf => { const s = scores[sf.id]; return s && s.s1 && s.s2; });
  const fScore = scores['20'];
  const fPlayed = fScore && fScore.s1 && fScore.s2;
  const fN1 = fPlayed ? parseInt(fScore.s1) : null;
  const fN2 = fPlayed ? parseInt(fScore.s2) : null;

  let fTeam1 = '?', fTeam2 = '?', fc1 = 'other', fc2 = 'other', fw1 = false, fw2 = false;
  let fChampion = null;

  if (allSfPlayed) {
    const sfWinners = SF_CONFIG.map(sf => {
      const s = scores[sf.id]; const n1 = parseInt(s.s1), n2 = parseInt(s.s2);
      const qfs = QF_MATCHES.filter(q => q.sf === sf.sf);
      const winners = qfs.map(q => { const sq = scores[q.id]; const nn1 = parseInt(sq.s1), nn2 = parseInt(sq.s2); return nn1 > nn2 ? q.t1 : q.t2; });
      return n1 > n2 ? winners[0] : winners[1];
    });
    fTeam1 = sfWinners[0]; fTeam2 = sfWinners[1];
    fc1 = getColor(fTeam1); fc2 = getColor(fTeam2);
    if (fPlayed) {
      fw1 = fN1 > fN2; fw2 = fN2 > fN1;
      fChampion = fw1 ? fTeam1 : fTeam2;
    }
  }

  if (!allSfPlayed) {
    html += `<div class="empty-state"><span class="eicon">⏳</span>En attente des demi-finales</div>`;
  } else {
    html += `
      <div class="match-card ${allSfPlayed ? 'played' : ''} ${fPlayed ? 'played' : ''}" id="mf-20">
        <div class="top-accent" style="background:${fPlayed ? 'var(--gold)' : ''}"></div>
        <div class="match-body" onclick="toggleElimEdit('20')">
          <div class="match-meta">
            <span class="match-tag fin">🏆 FINALE</span>
            <span class="match-terrain">Salle Paul Tavano</span>
          </div>
          <div class="team-row ${fc1} ${fw1 ? 'winner' : (fPlayed ? 'loser' : '')}">
            <span class="team-badge" style="background:var(--${fc1 === 'ces' ? 'ces' : fc1 === 'azay' ? 'azay' : fc1})"></span>
            <span class="team-name">${fTeam1}</span>
            <span class="team-score">${fPlayed ? fScore.s1 : '–'}</span>
            ${fw1 ? '<span class="arrow">🏆 CHAMPION</span>' : ''}
          </div>
          <div class="team-row ${fc2} ${fw2 ? 'winner' : (fPlayed ? 'loser' : '')}">
            <span class="team-badge" style="background:var(--${fc2 === 'ces' ? 'ces' : fc2 === 'azay' ? 'azay' : fc2})"></span>
            <span class="team-name">${fTeam2}</span>
            <span class="team-score">${fPlayed ? fScore.s2 : '–'}</span>
            ${fw2 ? '<span class="arrow">🏆 CHAMPION</span>' : ''}
          </div>
        </div>
        <div class="edit-overlay" id="ee-20">
          <div class="edit-row">
            <select id="es1-20">${Object.keys(ALL_TEAMS).map(t => `<option value="${t}">${t}</option>`).join('')}</select>
            <span class="vs-small">VS</span>
            <select id="es2-20">${Object.keys(ALL_TEAMS).map(t => `<option value="${t}">${t}</option>`).join('')}</select>
          </div>
          <div class="score-inputs" style="margin-top:6px">
            <div class="block"><input type="number" id="sf1-20" value="${fPlayed ? fScore.s1 : ''}" min="0" placeholder="0"></div>
            <div class="vs-sep">–</div>
            <div class="block"><input type="number" id="sf2-20" value="${fPlayed ? fScore.s2 : ''}" min="0" placeholder="0"></div>
          </div>
          <div class="edit-actions" style="margin-top:6px">
            <button class="btn-save" onclick="saveElimScore('20')">✅ Sauvegarder</button>
            <button class="btn-cancel" onclick="closeElimEdit('20')">Annuler</button>
          </div>
          <div class="saved-badge" id="esb-20"></div>
        </div>
      </div>`;
  }

  // ── 3RD PLACE ──
  html += `<div class="round" style="margin-top:16px"><div class="round-header third"><span class="icon">🥉</span><h2>Match pour la 3ᵉ place</h2><div class="line"></div></div>`;

  const someSfPlayed = SF_CONFIG.some(sf => { const s = scores[sf.id]; return s && s.s1 && s.s2; });
  const tScore = scores['19'];
  const tPlayed = tScore && tScore.s1 && tScore.s2;
  const tN1 = tPlayed ? parseInt(tScore.s1) : null;
  const tN2 = tPlayed ? parseInt(tScore.s2) : null;

  let tLosers = [];
  if (someSfPlayed) {
    tLosers = SF_CONFIG.map(sf => {
      const s = scores[sf.id];
      if (!s || !s.s1 || !s.s2) return null;
      const n1 = parseInt(s.s1), n2 = parseInt(s.s2);
      const qfs = QF_MATCHES.filter(q => q.sf === sf.sf);
      const winners = qfs.map(q => { const sq = scores[q.id]; const nn1 = parseInt(sq.s1), nn2 = parseInt(sq.s2); return nn1 > nn2 ? q.t1 : q.t2; });
      return n1 > n2 ? winners[1] : winners[0];
    }).filter(w => w !== null);
  }

  const tTeam1 = tLosers[0] || '?', tTeam2 = tLosers[1] || '?';
  const tc1 = tTeam1 !== '?' ? getColor(tTeam1) : 'other';
  const tc2 = tTeam2 !== '?' ? getColor(tTeam2) : 'other';
  const tw1 = tPlayed && tN1 > tN2;
  const tw2 = tPlayed && tN2 > tN1;

  if (!someSfPlayed) {
    html += `<div class="empty-state"><span class="eicon">⏳</span>En attente des demi-finales</div>`;
  } else {
    html += `
      <div class="match-card ${tLosers.length >= 2 ? 'played' : ''} ${tPlayed ? 'played' : ''}" id="mf-19">
        <div class="top-accent" style="background:${tPlayed ? 'var(--muted)' : ''}"></div>
        <div class="match-body" onclick="toggleElimEdit('19')">
          <div class="match-meta">
            <span class="match-tag third">🥉 3ᵉ place</span>
            <span class="match-terrain">Aire Pierrot Vérité</span>
          </div>
          ${tLosers.length < 2 ? `<div class="empty-state" style="padding:12px"><span class="eicon">⏳</span>En attente</div>` : `
          <div class="team-row ${tc1} ${tw1 ? 'winner' : (tPlayed ? 'loser' : '')}">
            <span class="team-badge" style="background:var(--${tc1 === 'ces' ? 'ces' : tc1 === 'azay' ? 'azay' : tc1})"></span>
            <span class="team-name">${tTeam1}</span>
            <span class="team-score">${tPlayed ? tScore.s1 : '–'}</span>
            ${tw1 ? '<span class="arrow">🥉 3ème</span>' : ''}
          </div>
          <div class="team-row ${tc2} ${tw2 ? 'winner' : (tPlayed ? 'loser' : '')}">
            <span class="team-badge" style="background:var(--${tc2 === 'ces' ? 'ces' : tc2 === 'azay' ? 'azay' : tc2})"></span>
            <span class="team-name">${tTeam2}</span>
            <span class="team-score">${tPlayed ? tScore.s2 : '–'}</span>
            ${tw2 ? '<span class="arrow">🥉 3ème</span>' : ''}
          </div>`}
        </div>
        <div class="edit-overlay" id="ee-19">
          <div class="edit-row">
            <select id="es1-19">${Object.keys(ALL_TEAMS).map(t => `<option value="${t}">${t}</option>`).join('')}</select>
            <span class="vs-small">VS</span>
            <select id="es2-19">${Object.keys(ALL_TEAMS).map(t => `<option value="${t}">${t}</option>`).join('')}</select>
          </div>
          <div class="score-inputs" style="margin-top:6px">
            <div class="block"><input type="number" id="sf1-19" value="${tPlayed ? tScore.s1 : ''}" min="0" placeholder="0"></div>
            <div class="vs-sep">–</div>
            <div class="block"><input type="number" id="sf2-19" value="${tPlayed ? tScore.s2 : ''}" min="0" placeholder="0"></div>
          </div>
          <div class="edit-actions" style="margin-top:6px">
            <button class="btn-save" onclick="saveElimScore('19')">✅ Sauvegarder</button>
            <button class="btn-cancel" onclick="closeElimEdit('19')">Annuler</button>
          </div>
          <div class="saved-badge" id="esb-19"></div>
        </div>
      </div>`;
  }

  // ── CHAMPION ──
  if (fChampion) {
    const champColor = getColor(fChampion);
    html += `
      <div class="champion-card">
        <span class="crown">🏆</span>
        <div style="margin-bottom:4px">
          <span class="name">${fChampion}</span>
        </div>
        <div class="sub">Champion Trophée Paul Tavano 2026 · U13M</div>
      </div>`;
  }

  html += `<div style="text-align:center;margin-top:20px;font-size:.68rem;color:var(--muted);font-family:'JetBrains Mono',monospace">
    🔄 Rafraîchir la page pour mettre à jour &middot; Cliquez sur un match pour modifier
  </div>`;

  app.innerHTML = html;
}

// ── INTERACTIONS ──
function toggleScore(id) {
  const panel = document.getElementById('se-' + id);
  if (!panel) return;
  const isOpen = panel.classList.contains('open');
  document.querySelectorAll('.score-edit.open').forEach(p => p.classList.remove('open'));
  document.querySelectorAll('.edit-overlay.open').forEach(p => p.classList.remove('open'));
  if (!isOpen) panel.classList.add('open');
}

function toggleElimEdit(id) {
  const panel = document.getElementById('ee-' + id);
  if (!panel) return;
  const isOpen = panel.classList.contains('open');
  document.querySelectorAll('.edit-overlay.open').forEach(p => p.classList.remove('open'));
  document.querySelectorAll('.score-edit.open').forEach(p => p.classList.remove('open'));
  if (!isOpen) {
    panel.classList.add('open');
    // Populate selects with current data
    const saved = eliminations[id] || {};
    const sel1 = document.getElementById('es1-' + id);
    const sel2 = document.getElementById('es2-' + id);
    if (sel1 && saved.team1) sel1.value = saved.team1;
    if (sel2 && saved.team2) sel2.value = saved.team2;
  }
}

function closeElimEdit(id) {
  document.getElementById('ee-' + id)?.classList.remove('open');
}

async function saveScore(id) {
  const i1 = document.getElementById('se1-' + id);
  const i2 = document.getElementById('se2-' + id);
  const v1 = i1.value.trim(), v2 = i2.value.trim();
  if (!v1 || !v2) return;
  scores[id] = { s1: v1, s2: v2 };
  try {
    await fetch('/api/score', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ match_id: id, score1: v1, score2: v2 })
    });
    document.getElementById('se-' + id)?.classList.remove('open');
    render();
  } catch(e) { console.warn('Save error:', e); }
}

async function delScore(id) {
  delete scores[id];
  try {
    await fetch('/api/score', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ match_id: id, score1: '', score2: '' })
    });
    document.getElementById('se-' + id)?.classList.remove('open');
    render();
  } catch(e) { console.warn('Delete error:', e); }
}

async function saveElimScore(id) {
  const sel1 = document.getElementById('es1-' + id);
  const sel2 = document.getElementById('es2-' + id);
  const s1 = document.getElementById('sf1-' + id);
  const s2 = document.getElementById('sf2-' + id);
  const team1 = sel1.value, team2 = sel2.value;
  const score1 = s1.value.trim(), score2 = s2.value.trim();

  if (score1 && score2) {
    scores[id] = { s1: score1, s2: score2 };
    await fetch('/api/score', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ match_id: id, score1, score2 })
    });
  }

  eliminations[id] = { team1, team2 };
  await fetch('/api/score', {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: 'elimination', match_id: id, team1, team2 })
  });

  const badge = document.getElementById('esb-' + id);
  if (badge) badge.textContent = '✓ sauvegardé';
  setTimeout(() => { document.getElementById('ee-' + id)?.classList.remove('open'); render(); }, 300);
}

// ── INIT ──
(async function init() {
  await loadData();
  render();
})();
</script>
</body>
</html>
